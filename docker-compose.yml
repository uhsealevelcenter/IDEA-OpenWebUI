services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=komar@hawaii.edu"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      # Keep long-running streamed responses (chat tokens, tool calls) alive.
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=600s"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./acme.json:/acme.json"
    networks:
      - web

  open-terminal:
    build:
      context: ./paperqa
      dockerfile: Dockerfile
    image: openwebui-open-terminal-paperqa:latest
    container_name: open-terminal
    restart: unless-stopped
    environment:
      - OPEN_TERMINAL_MULTI_USER=true
      - OPEN_TERMINAL_API_KEY=${OPEN_TERMINAL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - open-terminal:/home
      # Shared cache for tool-generated data (e.g. climate index CSVs),
      # readable from user terminal sessions at /shared.
      - shared-data:/shared
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-terminal.rule=Host(`openterminal.149-165-170-250.sslip.io`)"
      - "traefik.http.routers.open-terminal.entrypoints=websecure"
      - "traefik.http.routers.open-terminal.tls.certresolver=le"
      - "traefik.http.services.open-terminal.loadbalancer.server.port=8000"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - OPEN_TERMINAL_API_KEY=${OPEN_TERMINAL_API_KEY}
    volumes:
      - open-webui:/app/backend/data
      # Same shared volume, mounted at the same path so tool-reported
      # file paths are valid inside Open Terminal without translation.
      - shared-data:/shared
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=Host(`openwebui.149-165-170-250.sslip.io`)"
      - "traefik.http.routers.open-webui.entrypoints=websecure"
      - "traefik.http.routers.open-webui.tls.certresolver=le"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
      # Flush streamed (SSE) chat responses immediately instead of buffering.
      - "traefik.http.services.open-webui.loadbalancer.responseforwarding.flushinterval=-1s"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.149-165-170-250.sslip.io
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.149-165-170-250.sslip.io/
      - N8N_EDITOR_BASE_URL=https://n8n.149-165-170-250.sslip.io/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RUNNERS_ENABLED=true
      - GENERIC_TIMEZONE=Pacific/Honolulu
    volumes:
      - n8n:/home/node/.n8n
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.149-165-170-250.sslip.io`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=le"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

networks:
  web:
    driver: bridge

volumes:
  open-terminal:
  open-webui:
  n8n:
  shared-data: